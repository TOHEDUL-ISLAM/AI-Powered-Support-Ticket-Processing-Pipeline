# US-1.2: PostgreSQL for local dev and testing
services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
      POSTGRES_DB: ai_ticket_pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ai_ticket_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
